<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh sách VDV — HLRace</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D72B2B;--gold:#F5A623;--green:#27AE60;--blue:#2980B9;--dark:#0D0D0D;--dark2:#161616;--dark3:#202020;--light:#F0EDE8;--muted:#777;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12)}
body{background:var(--dark);color:var(--light);font-family:"Be Vietnam Pro",sans-serif;min-height:100vh}

.topbar{display:flex;background:var(--dark2);border-bottom:1px solid var(--border);padding:0 20px;gap:4px}
.tb-btn{padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent}
.tb-btn.active{color:var(--red);border-bottom-color:var(--red)}

.hero{background:var(--dark2);padding:32px 20px 28px;text-align:center;border-bottom:3px solid var(--red);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(215,43,43,.15),transparent 70%);pointer-events:none}
.hero-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(36px,8vw,72px);line-height:.95;color:#fff;position:relative}
.hero-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:8px;position:relative}

.wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px}

/* RACE SELECTOR */
.race-selector{background:var(--dark2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.rs-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.rs-select{width:100%;padding:10px 12px;background:var(--dark3);border:1px solid var(--border2);border-radius:7px;color:var(--light);font-family:"Be Vietnam Pro",sans-serif;font-size:13px;outline:none;cursor:pointer}
.rs-select:focus{border-color:var(--gold)}
.rs-select option{background:var(--dark3)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.sn{font-family:"Bebas Neue",sans-serif;font-size:28px;line-height:1}
.sl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

/* FILTER TABS */
.ftabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ftab{padding:5px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;border:1.5px solid var(--border2);background:none;color:var(--muted);transition:all .2s;font-family:"Be Vietnam Pro",sans-serif}
.ftab:hover{border-color:var(--muted);color:var(--light)}
.ftab.active{background:var(--red);border-color:var(--red);color:#fff}

/* SEARCH */
.search-box{width:100%;padding:10px 14px 10px 38px;background:var(--dark2);border:1.5px solid var(--border2);border-radius:8px;color:var(--light);font-family:"Be Vietnam Pro",sans-serif;font-size:13px;outline:none;margin-bottom:12px;transition:border-color .2s}
.search-box:focus{border-color:var(--gold)}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.refresh-bar{display:flex;justify-content:flex-end;align-items:center;gap:8px;font-size:11px;color:var(--muted);margin-bottom:10px}
.refresh-btn{background:none;border:1px solid var(--border2);border-radius:4px;color:var(--muted);cursor:pointer;font-size:11px;padding:3px 8px;transition:all .15s;font-family:"Be Vietnam Pro",sans-serif}
.refresh-btn:hover{color:var(--light);border-color:var(--muted)}

/* RUNNER CARD */
.runner-card{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:all .2s;animation:fu .25s ease both}
.runner-card:hover{border-color:rgba(255,255,255,.12);transform:translateX(2px)}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.runner-bib{width:52px;height:52px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",sans-serif;font-size:13px;font-weight:700;text-align:center;flex-shrink:0;line-height:1.2;padding:4px}
.runner-info{flex:1;min-width:0}
.runner-name{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.runner-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--muted)}
.meta-tag{padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.06);font-size:10px}
.status-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;flex-shrink:0}
.st-approved{background:rgba(39,174,96,.15);color:#27AE60;border:1px solid rgba(39,174,96,.25)}
.st-pending{background:rgba(245,166,35,.12);color:#F5A623;border:1px solid rgba(245,166,35,.2)}
.st-rejected{background:rgba(215,43,43,.1);color:#D72B2B;border:1px solid rgba(215,43,43,.2)}

.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.7}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html" class="tb-btn">🏃 Đăng ký</a>
  <a href="public.html" class="tb-btn active">📋 Danh sách</a>
</div>

<div class="hero">
  <div class="hero-title" id="heroTitle">HLRACE 2026</div>
  <div class="hero-sub" id="heroSub">Danh sách van dong vien</div>
</div>

<div class="wrap">

  <!-- RACE SELECTOR -->
  <div class="race-selector" id="race-selector-wrap">
    <div class="rs-label">📅 Chọn giải để xem</div>
    <select class="rs-select" id="raceSelect" onchange="onRaceChange()">
      <option value="all">— Tất cả các giải —</option>
    </select>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat"><div class="sn" id="sTot">—</div><div class="sl">Tổng đăng ký</div></div>
    <div class="stat"><div class="sn" id="sApproved" style="color:var(--green)">—</div><div class="sl">Đã xác nhận</div></div>
    <div class="stat"><div class="sn" id="sPending" style="color:var(--gold)">—</div><div class="sl">Chờ duyệt</div></div>
    <div class="stat"><div class="sn" id="sTeam" style="color:var(--blue)">—</div><div class="sl">Nhóm / Team</div></div>
  </div>

  <!-- FILTER TABS -->
  <div class="ftabs">
    <button class="ftab active" onclick="setTab('all',this)">Tat ca</button>
    <button class="ftab" onclick="setTab('5km',this)">5km</button>
    <button class="ftab" onclick="setTab('10km',this)">10km</button>
    <button class="ftab" onclick="setTab('21km',this)">21km</button>
    <button class="ftab" onclick="setTab('duathlon',this)">Duathlon</button>
    <button class="ftab" onclick="setTab('triathlon',this)">Triathlon</button>
    <button class="ftab" onclick="setTab('relay',this)">Relay</button>
    <button class="ftab" onclick="setTab('kid',this)">Kid Run</button>
    <button class="ftab" onclick="setTab('team',this)">👥 Nhom</button>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" id="searchBox" placeholder="Nhập tên để tìm kiếm..." oninput="renderList()">
  </div>
  <div class="refresh-bar">
    <span id="lastUpdated"></span>
  </div>

  <!-- LIST -->
  <div id="listWrap">
    <div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Đang tải...</div></div>
  </div>
</div>

<script>
const SHEET_URL = localStorage.getItem('race_sheet_url') || '';
let allData = [], curTab = 'all', curRace = 'all';

// ── JSONP ─────────────────────────────────────────────────────
function fetchSheet(url, cb) {
  const name = 'cb_' + Date.now();
  const s = document.createElement('script');
  const t = setTimeout(()=>{ delete window[name]; try{document.body.removeChild(s);}catch(e){} cb(null); }, 10000);
  window[name] = (d)=>{ clearTimeout(t); delete window[name]; try{document.body.removeChild(s);}catch(e){} cb(d); };
  s.src = url + (url.includes('?')? '&' : '?') + 'callback=' + name;
  document.body.appendChild(s);
}

// ── CONFIG ────────────────────────────────────────────────────
function applyConfigToPublic() {
  const cfg = {};
  try { Object.assign(cfg, JSON.parse(localStorage.getItem('race_config')||'{}')); } catch(e){}
  if(cfg.raceName) {
    document.getElementById('heroTitle').textContent = (cfg.raceName||'HLRace').toUpperCase();
    document.title = cfg.raceName + ' — Danh sách VDV';
  }
  if(cfg.raceDate||cfg.raceLocation) {
    document.getElementById('heroSub').textContent = [cfg.raceDate,cfg.raceLocation].filter(Boolean).join(' · ');
  }
}

// ── LOAD DATA ─────────────────────────────────────────────────
function loadData(){
  if(!SHEET_URL){
    document.getElementById('listWrap').innerHTML='<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-text">Chưa cấu hình kết nối dữ liệu.<br>Liên hệ Admin.</div></div>';
    return;
  }
  fetchSheet(SHEET_URL+'?action=getRegistrations&t='+Date.now(), function(json){
    if(!json){
      document.getElementById('listWrap').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Khong the tai du lieu. <button class="refresh-btn" onclick="loadData()">Thử lại</button></div></div>';
      return;
    }
    allData = json.data || [];
    buildRaceDropdown();
    document.getElementById('lastUpdated').innerHTML =
      'Cập nhật lúc: '+new Date().toLocaleTimeString('vi-VN')+
      ' <button class="refresh-btn" onclick="loadData()">🔄 Làm mới</button>';
    renderList();
  });
}

// ── RACE DROPDOWN ─────────────────────────────────────────────
function buildRaceDropdown() {
  // Gom theo raceName thực sự (không dùng eventType)
  const races = [...new Set(allData.map(r => r.raceName || '').filter(Boolean))];
  const wrap = document.getElementById('race-selector-wrap');
  const sel  = document.getElementById('raceSelect');

  // Nếu chỉ có 1 giải (hoặc không có raceName) -> ẩn dropdown
  if(races.length <= 1) {
    if(wrap) wrap.style.display = 'none';
    return;
  }

  // Có nhiều giải -> hiện dropdown
  if(wrap) wrap.style.display = 'block';
  sel.innerHTML = '<option value="all">— Tất cả các giải —</option>';
  races.forEach(race => {
    const opt = document.createElement('option');
    opt.value = race;
    opt.textContent = race;
    sel.appendChild(opt);
  });
  sel.value = curRace;
}

function onRaceChange() {
  curRace = document.getElementById('raceSelect').value;
  renderList();
}

function evLabel(ev) {
  const map = {run_5k:'Run 5K',run_10k:'Run 10K',run_21k:'Run 21K',duathlon:'Duathlon',triathlon:'Triathlon',relay:'Relay 3 mon',kid_run:'Kid Run'};
  return map[ev] || ev;
}

// ── TAB FILTER ────────────────────────────────────────────────
function setTab(t, btn) {
  curTab = t;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── RENDER ────────────────────────────────────────────────────
function renderList() {
  const q = (document.getElementById('searchBox').value||'').toLowerCase();

  let list = allData.filter(r => {
    const dist  = (r.distance||r.teamDist||'').toLowerCase();
    const event = (r.eventType||'').toLowerCase();

    // Filter theo race dropdown
    if(curRace !== 'all') {
      if(curRace.startsWith('event:')) {
        if(event !== curRace.replace('event:','')) return false;
      } else {
        if((r.raceName||r.raceId||'') !== curRace) return false;
      }
    }

    // Filter theo tab
    if(curTab === 'team'     && !r.teamCode) return false;
    if(curTab === '5km'      && !dist.includes('5')) return false;
    if(curTab === '10km'     && !dist.includes('10')) return false;
    if(curTab === '21km'     && !dist.includes('21')) return false;
    if(curTab === 'duathlon' && !event.includes('duathlon')) return false;
    if(curTab === 'triathlon'&& !event.includes('triathlon')) return false;
    if(curTab === 'relay'    && !event.includes('relay')) return false;
    if(curTab === 'kid'      && !event.includes('kid')) return false;

    // Search
    if(q && !(r.fullName||r.teamName||'').toLowerCase().includes(q)) return false;

    return true;
  });

  // Stats (theo race filter, bo qua tab va search)
  let raceList = curRace==='all' ? allData : allData.filter(r=>{
    if(curRace.startsWith('event:')) return (r.eventType||'')===curRace.replace('event:','');
    return (r.raceName||r.raceId||'')===curRace;
  });

  document.getElementById('sTot').textContent     = raceList.length;
  document.getElementById('sApproved').textContent = raceList.filter(r=>r.status==='approved').length;
  document.getElementById('sPending').textContent  = raceList.filter(r=>r.status==='pending').length;
  document.getElementById('sTeam').textContent     = raceList.filter(r=>r.teamCode).length;

  if(!list.length){
    document.getElementById('listWrap').innerHTML = q
      ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Khong tim thay "<strong>${esc(q)}</strong>"</div></div>`
      : '<div class="empty"><div class="empty-icon">🏃</div><div class="empty-text">Chưa có vận động viên nào</div></div>';
    return;
  }

  document.getElementById('listWrap').innerHTML = list.map((r,i) => {
    const dist = r.distance || r.teamDist || '';
    const ev   = r.eventType || '';

    // Mau BIB theo cự ly / event
    const bibColors = {
      '5km':    {bg:'rgba(39,174,96,.18)',  c:'#27AE60'},
      '5K':     {bg:'rgba(39,174,96,.18)',  c:'#27AE60'},
      '10km':   {bg:'rgba(41,128,185,.18)', c:'#2980B9'},
      '10K':    {bg:'rgba(41,128,185,.18)', c:'#2980B9'},
      '21km':   {bg:'rgba(215,43,43,.18)',  c:'#D72B2B'},
      '21K':    {bg:'rgba(215,43,43,.18)',  c:'#D72B2B'},
    };
    let bc = bibColors[dist] || bibColors[dist.toUpperCase()] || {bg:'rgba(245,166,35,.15)',c:'#F5A623'};
    if(ev.includes('duathlon'))  bc = {bg:'rgba(241,196,15,.15)',c:'#F39C12'};
    if(ev.includes('triathlon')) bc = {bg:'rgba(41,128,185,.15)',c:'#3498DB'};
    if(ev.includes('relay'))     bc = {bg:'rgba(39,174,96,.12)', c:'#52BE80'};
    if(ev.includes('kid'))       bc = {bg:'rgba(155,89,182,.15)',c:'#BB8FCE'};

    // Label BIB
    const bibLabel = ev.includes('duathlon') ? 'DUO'
      : ev.includes('triathlon') ? 'TRI'
      : ev.includes('relay') ? 'RELAY'
      : ev.includes('kid') ? 'KID'
      : dist.toUpperCase() || '—';

    // 1 badge duy nhat
    const stMap = {
      approved: {cls:'st-approved', label:'✅ Đã xác nhận'},
      pending:  {cls:'st-pending',  label:'⏳ Chờ duyệt'},
      rejected: {cls:'st-rejected', label:'❌ Từ chối'},
    };
    const st = stMap[r.status] || stMap.pending;

    const teamBadge = r.teamCode
      ? `<span class="meta-tag">👥 ${esc(r.teamCode)}</span>`
      : '';

    return `<div class="runner-card" style="animation-delay:${i*0.03}s">
      <div class="runner-bib" style="background:${bc.bg};color:${bc.c}">${bibLabel}</div>
      <div class="runner-info">
        <div class="runner-name">${esc(r.fullName||r.teamName||'—')}</div>
        <div class="runner-meta">
          ${r.gender ? `<span>${r.gender}</span>` : ''}
          ${r.city   ? `<span>${esc(r.city)}</span>` : ''}
          ${r.shirtSize ? `<span>Size ${r.shirtSize}</span>` : ''}
          ${teamBadge}
        </div>
      </div>
      <span class="status-badge ${st.cls}">${st.label}</span>
    </div>`;
  }).join('');
}

function esc(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function(){
  applyConfigToPublic();
  loadData();
  setInterval(loadData, 120000);
});
</script>
</body>
</html>
