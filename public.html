<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danh Sách Xác Nhận — Giải Chạy 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D72B2B;--gold:#F5A623;--green:#27AE60;--dark:#0D0D0D;--dark2:#161616;--dark3:#202020;--light:#F0EDE8;--muted:#777;--border:rgba(255,255,255,0.07)}
body{background:var(--dark);color:var(--light);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh}

.topbar{display:flex;background:var(--dark2);border-bottom:1px solid var(--border);padding:0 20px;gap:4px}
.tb-btn{padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;transition:all .2s}
.tb-btn:hover{color:var(--light)}
.tb-btn.active{color:var(--red);border-bottom-color:var(--red)}

.header{background:var(--dark2);padding:36px 20px 28px;text-align:center;border-bottom:2px solid var(--red);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(215,43,43,.15) 0%,transparent 70%);pointer-events:none}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,56px);letter-spacing:3px;position:relative;margin-bottom:6px}
.hsub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;position:relative}

.wrap{max-width:760px;margin:0 auto;padding:28px 20px 80px}

.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:12px 18px;flex:1;min-width:100px;text-align:center}
.stat .sn{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1}
.stat .sl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

.search-wrap{position:relative;margin-bottom:18px}
.search-wrap input{width:100%;padding:12px 14px 12px 42px;background:var(--dark2);border:1.5px solid var(--border);border-radius:8px;color:var(--light);font-family:'Be Vietnam Pro',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--red)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}

.filter-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.ftab{padding:6px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border:1.5px solid var(--border);background:none;color:var(--muted);transition:all .2s}
.ftab:hover{border-color:var(--muted);color:var(--light)}
.ftab.active{background:var(--red);border-color:var(--red);color:#fff}

.runner-card{background:var(--dark2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;transition:all .2s;animation:fu .25s ease both}
.runner-card:hover{border-color:rgba(255,255,255,.12);transform:translateX(2px)}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.runner-bib{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:#fff;flex-shrink:0;text-align:center;line-height:1.1}
.runner-info{flex:1;min-width:0}
.runner-name{font-weight:700;font-size:15px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.runner-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.team-badge{background:rgba(41,128,185,.12);color:#5dade2;font-size:9px;font-weight:800;padding:1px 6px;border-radius:2px;letter-spacing:.5px}
.ok-badge{color:var(--green);font-size:11px;font-weight:700;white-space:nowrap}

.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:14px}

.loading{text-align:center;padding:40px;color:var(--muted);font-size:13px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}

.last-updated{text-align:right;font-size:10px;color:var(--muted);margin-bottom:14px}
.refresh-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;margin-left:8px;text-decoration:underline}
.refresh-btn:hover{color:var(--light)}
</style>

<script src="hlrace-i18n.js"></script>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="tb-btn">🏃 Đăng ký</a>
  <a href="public.html" class="tb-btn active">📋 Danh sách</a>
</div>

<div class="header">
  <h1 class="htitle" id="pubTitle">📋 Danh Sách Xác Nhận</h1>
  <p class="hsub" id="pubSub">Giải chạy Hoàn Kiếm 21/03/2026 · Chỉ hiển thị VĐV đã xác nhận thanh toán</p>
</div>

<div class="wrap">
  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="sn" id="sTot">—</div><div class="sl">Tổng xác nhận</div></div>
    <div class="stat"><div class="sn" style="color:var(--gold)" id="s15">—</div><div class="sl">1.5km</div></div>
    <div class="stat"><div class="sn" style="color:var(--red)" id="s3">—</div><div class="sl">3km</div></div>
    <div class="stat"><div class="sn" style="color:var(--green)" id="s5">—</div><div class="sl">5km</div></div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchBox" placeholder="Nhập tên để tìm kiếm..." oninput="renderList()">
  </div>

  <div class="filter-tabs">
    <button class="ftab active" onclick="setTab('all',this)">Tất cả</button>
    <button class="ftab" onclick="setTab('1.5km',this)">1.5km</button>
    <button class="ftab" onclick="setTab('3km',this)">3km</button>
    <button class="ftab" onclick="setTab('5km',this)">5km</button>
    <button class="ftab" onclick="setTab('team',this)">👥 Team</button>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
  <div id="listWrap"><div class="loading"><div class="spin"></div><br>Đang tải danh sách...</div></div>
</div>

<script src="race-config.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => applyConfigToPublic());
const SHEET_URL = localStorage.getItem('race_sheet_url') || '';
let allData = [], curTab = 'all';

function fetchSheet(url, cb) {
  const name = 'cb_' + Date.now();
  const s = document.createElement('script');
  const t = setTimeout(()=>{ delete window[name]; try{document.body.removeChild(s);}catch(e){} cb(null); }, 10000);
  window[name] = (d)=>{ clearTimeout(t); delete window[name]; try{document.body.removeChild(s);}catch(e){} cb(d); };
  s.src = url + (url.includes('?')?'&':'?') + 'callback=' + name;
  document.body.appendChild(s);
}

function loadData(){
  if(!SHEET_URL){
    document.getElementById('listWrap').innerHTML='<div class="empty"><div class="empty-icon">⚙️</div><div class="empty-text">Chưa cấu hình kết nối dữ liệu.</div></div>';
    return;
  }
  document.getElementById('listWrap').innerHTML='<div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Đang tải...</div></div>';
  fetchSheet(SHEET_URL+'?action=getRegistrations&t='+Date.now(), function(json){
    if(!json){
      document.getElementById('listWrap').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Không thể tải. <button class="refresh-btn" onclick="loadData()">Thử lại</button></div></div>';
      return;
    }
    allData = json.data || [];
    document.getElementById('lastUpdated').innerHTML = 'Cập nhật lúc: '+new Date().toLocaleTimeString('vi-VN')+' <button class="refresh-btn" onclick="loadData()">🔄 Làm mới</button>';
    renderList();
  });
}

function setTab(t, btn){
  curTab=t;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  let list=allData.filter(r=>{
    const matchTab = curTab==='all'||r.distance===curTab||r.teamDist===curTab||(curTab==='team'&&r.teamCode);
    const matchQ = !q||(r.fullName||r.teamName||'').toLowerCase().includes(q);
    return matchTab && matchQ;
  });

  const ap=allData;
  document.getElementById('sTot').textContent=ap.length;
  document.getElementById('sPending') && (document.getElementById('sPending').textContent=ap.filter(r=>r.status==='pending').length);
  document.getElementById('sApproved') && (document.getElementById('sApproved').textContent=ap.filter(r=>r.status==='approved').length);
  document.getElementById('s15').textContent=ap.filter(r=>r.distance==='1.5km'||r.teamDist==='1.5km').length;
  document.getElementById('s3').textContent=ap.filter(r=>r.distance==='3km'||r.teamDist==='3km').length;
  document.getElementById('s5').textContent=ap.filter(r=>r.distance==='5km'||r.teamDist==='5km').length;

  if(!list.length){
    document.getElementById('listWrap').innerHTML=q
      ?`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Không tìm thấy "<strong>${esc(q)}</strong>"</div></div>`
      :`<div class="empty"><div class="empty-icon">🏃</div><div class="empty-text">Chưa có vận động viên nào được xác nhận</div></div>`;
    return;
  }

  document.getElementById('listWrap').innerHTML=list.map((r,i)=>{
    const dist=r.distance||r.teamDist||'';
    const bibColor=dist==='1.5km'?'#c0932a':dist==='5km'?'#1e8449':'#c0392b';
    const bibBg=dist==='1.5km'?'rgba(245,166,35,.15)':dist==='5km'?'rgba(39,174,96,.15)':'rgba(215,43,43,.15)';
    const teamBadge=r.teamCode?`<span class="team-badge">👥 ${r.teamCode}</span>`:'';
    const statusMap = {
      approved: {label:'✅ Đã xác nhận', bg:'rgba(39,174,96,.15)', color:'#27AE60'},
      pending:  {label:'⏳ Chờ duyệt',   bg:'rgba(245,166,35,.12)', color:'#F5A623'},
      rejected: {label:'❌ Từ chối',      bg:'rgba(215,43,43,.12)', color:'#D72B2B'},
    };
    const st = statusMap[r.status] || statusMap.pending;
    const statusBadge = `<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:${st.bg};color:${st.color};font-weight:700">${st.label}</span>`;
    return `<div class="runner-card" style="animation-delay:${i*0.03}s">
      <div class="runner-bib" style="background:${bibBg};color:${bibColor}">${dist||'—'}</div>
      <div class="runner-info">
        <div class="runner-name">${esc(r.fullName||r.teamName||'—')}</div>
        <div class="runner-meta">
          ${r.gender?'<span>'+r.gender+'</span>':''}
          ${r.city?'<span>'+esc(r.city)+'</span>':''}
          ${r.shirtSize?'<span>Size '+r.shirtSize+'</span>':''}
          ${teamBadge} ${statusBadge}
        </div>
      </div>
      <div class="ok-badge">✅ Xác nhận</div>
    </div>`;
  }).join('');
}

function esc(s){return(s||'').toString().replace(/</g,'&lt;').replace(/>/g,'&gt;')}

loadData();
// Tự làm mới mỗi 2 phút
setInterval(loadData, 120000);
</script>

</body>
</html>
